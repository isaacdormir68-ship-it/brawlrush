<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BrawlRush - Stats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>BrawlRush</h1>
        <input type="text" id="tagInput" placeholder="Ex: PQR123">
        <button id="searchBtn">Rechercher</button>
        
        <div id="result" class="stats-card hidden">
            <h2 id="name"></h2>
            <p>Trophées : <span id="trophies"></span></p>
            <p>Club : <span id="club"></span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
